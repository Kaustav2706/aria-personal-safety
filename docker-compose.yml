version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aria-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: aria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - aria-network

  backend:
    build: ./backend
    container_name: aria-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=aria_secure_jwt_secret_key_change_me
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/aria
      - AI_ENGINE_URL=http://ai-engine:8000
      - TWILIO_SID=ACXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
      - TWILIO_TOKEN=your_twilio_auth_token
      - TWILIO_PHONE_NUMBER=+1234567890
    depends_on:
      - postgres
    networks:
      - aria-network

  ai-engine:
    build: ./ai-engine
    container_name: aria-ai-engine
    ports:
      - "8000:8000"
    networks:
      - aria-network

volumes:
  pgdata:

networks:
  aria-network:
    driver: bridge
